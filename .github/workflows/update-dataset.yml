name: Update Upwork market dataset

# Pulls the latest CSV exports from the SnipeWork public API and commits them.
# Runs every Monday (after the week is finalized) and can be triggered manually.
on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest dataset CSVs
        run: |
          mkdir -p data
          curl -sSL "https://snipework.com/api/market/dataset?file=weekly"     -o data/weekly.csv
          curl -sSL "https://snipework.com/api/market/dataset?file=categories" -o data/categories.csv
          curl -sSL "https://snipework.com/api/market/dataset?file=countries"  -o data/countries.csv

      - name: Show what changed
        run: |
          echo "weekly.csv rows: $(wc -l < data/weekly.csv)"
          echo "categories.csv rows: $(wc -l < data/categories.csv)"
          echo "countries.csv rows: $(wc -l < data/countries.csv)"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.csv
          if git diff --staged --quiet; then
            echo "No changes this week."
          else
            WEEK=$(head -2 data/weekly.csv | tail -1 | cut -d',' -f1)
            git commit -m "data: weekly update ($WEEK)"
            git push
          fi
